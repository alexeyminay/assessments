stages:
  - build
  - deploy

variables:
  BACKEND_IMAGE: $CI_REGISTRY_IMAGE/backend:$CI_COMMIT_SHA
  FRONTEND_IMAGE: $CI_REGISTRY_IMAGE/frontend:$CI_COMMIT_SHA

# ── Build ──────────────────────────────────────────────────────────────────────

build-backend:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    - docker build -t "$BACKEND_IMAGE" backend/Assessments
    - docker push "$BACKEND_IMAGE"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

build-frontend:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    - docker build -t "$FRONTEND_IMAGE" web
    - docker push "$FRONTEND_IMAGE"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

# ── Deploy ─────────────────────────────────────────────────────────────────────

deploy:
  stage: deploy
  image: alpine:3.20
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - ssh-keyscan -H "$SERVER_HOST" >> ~/.ssh/known_hosts
  script:
    - |
      ssh "$SERVER_USER@$SERVER_HOST" "
        set -e
        cd /opt/assessments/infra

        # Write current image tags to .env
        sed -i 's|BACKEND_IMAGE=.*|BACKEND_IMAGE=$BACKEND_IMAGE|' .env
        sed -i 's|FRONTEND_IMAGE=.*|FRONTEND_IMAGE=$FRONTEND_IMAGE|' .env

        docker login -u '$CI_REGISTRY_USER' -p '$CI_REGISTRY_PASSWORD' '$CI_REGISTRY'
        docker compose -f docker-compose.prod.yml pull
        docker compose -f docker-compose.prod.yml up -d --remove-orphans
        docker image prune -f
      "
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  needs:
    - build-backend
    - build-frontend
