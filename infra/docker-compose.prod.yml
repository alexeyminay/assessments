services:

  postgres:
    image: postgres:16-alpine
    command: >
      postgres
      -c max_connections=200
      -c shared_buffers=256MB
    environment:
      POSTGRES_DB:       assessments
      POSTGRES_USER:     ${DB_USER:-admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U ${DB_USER:-admin} -d assessments"]
      interval: 5s
      timeout:  5s
      retries:  10

  backend:
    image: ${BACKEND_IMAGE}
    environment:
      DB_URL:      jdbc:postgresql://postgres:5432/assessments
      DB_USER:     ${DB_USER:-admin}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET:  ${JWT_SECRET}
    ports:
      - "127.0.0.1:8080:8080"
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    image: ${FRONTEND_IMAGE}
    ports:
      - "127.0.0.1:3000:80"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"
    depends_on:
      - backend

volumes:
  postgres_data:
