services:

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB:       assessments
      POSTGRES_USER:     admin
      POSTGRES_PASSWORD: admin
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U admin -d assessments"]
      interval: 5s
      timeout:  5s
      retries:  10

  backend:
    build:
      context:    ../backend/Assessments
      dockerfile: Dockerfile
    environment:
      DB_URL:      jdbc:postgresql://postgres:5432/assessments
      DB_USER:     admin
      DB_PASSWORD: admin
      JWT_SECRET:  change-me-in-production
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context:    ../web
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
